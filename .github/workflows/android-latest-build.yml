name: Android (Latest App) Build APK

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build-latest-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Read latest app path
        id: app
        shell: bash
        run: |
          APP_PATH="$(cat apps/LATEST_APP_PATH.txt | tr -d '\r\n')"
          if [ -z "$APP_PATH" ]; then
            echo "apps/LATEST_APP_PATH.txt is empty" >&2
            exit 1
          fi

          APP_ROOT="$(dirname "$APP_PATH")"
          APP_SLUG="$(basename "$APP_ROOT")"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app_root=$APP_ROOT" >> "$GITHUB_OUTPUT"
          echo "app_slug=$APP_SLUG" >> "$GITHUB_OUTPUT"

          echo "Latest Android path: $APP_PATH"
          echo "App slug: $APP_SLUG"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build + Test (Debug)
        working-directory: ${{ steps.app.outputs.app_path }}
        shell: bash
        run: |
          if [ ! -f ./gradlew ]; then
            echo "gradlew missing in ${{ steps.app.outputs.app_path }}" >&2
            exit 1
          fi
          chmod +x ./gradlew
          ./gradlew test
          ./gradlew assembleDebug

      - name: Discover APK paths
        id: apk
        working-directory: ${{ steps.app.outputs.app_path }}
        shell: bash
        run: |
          APK_PATHS="$(find . -path '*/build/outputs/apk/debug/*.apk' -print || true)"
          if [ -z "$APK_PATHS" ]; then
            echo "APK_NOT_FOUND" >&2
            exit 1
          fi
